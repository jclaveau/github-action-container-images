networks:
  tests-network:

services:
  postgres:
    container_name: postgres
    image: timescale/timescaledb-ha:pg15
    ports:
      - 5432:5432
    volumes:
      # - /home/runner/docker/volumes/postgres_15:/home/postgres/pgdata/data
      - ./docker/volumes/postgres_15:/home/postgres/pgdata
    networks:
      - tests-network
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "postgres"
      # Nested dind has no /sys/fs/cgroup/memory.max, so pin tuning to skip cgroup auto-detection
      # (otherwise timescaledb-tune panics on 0 bytes and postgres exits 2).
      TS_TUNE_MEMORY: "512MB"
      TS_TUNE_NUM_CPUS: "2"
    healthcheck:
      test: pg_isready -U postgres -d postgres
      interval: 3s
      timeout: 0s
      retries: 30
