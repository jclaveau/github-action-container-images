name: Build and Push Docker Images

on:
  push:
    # branches: [ main ]
    # paths:
    #   - 'base/**'
    #   - 'pnpm/**'
    #   - 'playwright/**'
    #   - 'dind/**'
    #   - '.github/workflows/docker-publish.yml'
  pull_request:
    branches: [ main ]
  # schedule:
  #   # Run weekly to get security updates
  #   - cron: '0 0 * * 0'
  # workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github-context:
    runs-on: ubuntu-latest
    outputs:
      docker_group_id: ${{ steps.extract_docker_group_id.outputs.docker_group_id }}
      # Images reference each other by this tag: pr-<n> on PRs, latest on push (both freshly pushed this run).
      tag: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'latest' }}
    steps:
      # for debug only
      - run: sudo cat /etc/passwd
      - run: sudo cat /etc/group
      - run: pwd
      - run: whoami
      - run: id -u
      - run: id -g
      - run: groups runner
      - run: ls -l /home/runner
      - run: env

      - uses: actions/checkout@v4

      # used later
      - id: extract_docker_group_id
        run: 'echo "docker_group_id=$(getent group docker | cut -d: -f3)" >> "$GITHUB_OUTPUT"'


  # ----------------------------------------------------------------------------
  # Builds: per layer, the dood image then the dind overlay on top of it.
  # `dind` = `dood` + the ./dind overlay (start-dockerd); installs live only in dood.
  # Matrix `os` is currently [ubuntu]; adding alpine = extend the list (+ os-specific dirs).
  # ----------------------------------------------------------------------------

  build-base-dood:
    runs-on: ubuntu-latest
    needs: github-context
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v5
        with:
          context: ./base
          push: true # PRs push too so test jobs can pull this exact build
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DOCKER_GROUP_ID=${{ needs.github-context.outputs.docker_group_id }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood:buildcache,mode=max

  build-base-dind:
    runs-on: ubuntu-latest
    needs: [github-context, build-base-dood]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v5
        with:
          context: ./dind
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood:${{ needs.github-context.outputs.tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind:buildcache,mode=max


  build-pnpm-dood:
    runs-on: ubuntu-latest
    needs: [github-context, build-base-dood]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-pnpm
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v5
        with:
          context: ./pnpm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood:${{ needs.github-context.outputs.tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-pnpm:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-pnpm:buildcache,mode=max

  build-pnpm-dind:
    runs-on: ubuntu-latest
    needs: [github-context, build-pnpm-dood]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-pnpm
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v5
        with:
          context: ./dind
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-pnpm:${{ needs.github-context.outputs.tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-pnpm:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-pnpm:buildcache,mode=max


  build-playwright-dood:
    runs-on: ubuntu-latest
    needs: [github-context, build-pnpm-dood]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-playwright
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v5
        with:
          context: ./playwright
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-pnpm:${{ needs.github-context.outputs.tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-playwright:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-playwright:buildcache,mode=max

  build-playwright-dind:
    runs-on: ubuntu-latest
    needs: [github-context, build-playwright-dood]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-playwright
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v5
        with:
          context: ./dind
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-playwright:${{ needs.github-context.outputs.tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-playwright:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-playwright:buildcache,mode=max


  # ----------------------------------------------------------------------------
  # Tests: same suite per layer, run on every os×mode cell. Only the pwd test and
  # the Postgres endpoint branch by mode (dind uses the inner daemon on localhost;
  # dood uses the GHA-mounted host daemon via host.docker.internal).
  # ----------------------------------------------------------------------------

  test-base:
    runs-on: ubuntu-latest
    needs: [github-context, build-base-dood, build-base-dind]
    timeout-minutes: 5
    env:
      # overlay2-on-overlayfs is unstable nested in GHA container jobs; fuse-overlayfs gives
      # overlay-like CoW (far faster than vfs) and works here (/dev/fuse present). vfs is the
      # documented fallback. dood ignores this (no inner daemon).
      DOCKER_STORAGE_DRIVER: fuse-overlayfs
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
        mode: [dood, dind]
    container:
      image: jclaveau/${{ matrix.os }}-${{ matrix.mode }}:${{ needs.github-context.outputs.tag }}
      # dind: point clients at the inner daemon via the container env (NOT $GITHUB_ENV, which would
      # leak DOCKER_HOST to the host-side post-job cleanup and fail it). dood: unset => host socket.
      options: >-
        --privileged
        --add-host=host.docker.internal:host-gateway
        --env "PWD=${{ github.workspace }}"
        --env "HOME=/home/runner"
        ${{ matrix.mode == 'dind' && '--env DOCKER_HOST=unix:///var/run/dind.sock' || '' }}
      volumes:
        - /home/runner/work:/home/runner/work
    steps:
      # Kept multi-step on purpose: the images are a drop-in optimization, so a consumer's normal
      # multi-step workflow must work unchanged. dind only adds `start-dockerd` as the first step;
      # the inner daemon then persists across steps (verified by tmp-dind-debug.yml).
      - name: Start inner daemon (dind only)
        if: matrix.mode == 'dind'
        run: start-dockerd

      - run: docker info

      - uses: actions/checkout@v4

      - name: Creating DB volume (as locally)
        run: |
          sudo mkdir -p -m 777 ./docker/volumes/postgres_15
          sudo chown -R 1000:1000 ./docker/volumes/postgres_15/

      - run: docker compose -f ./docker-compose-tests.yaml up -d --wait

      - name: Postgres reachable
        run: sudo nc -zv ${{ matrix.mode == 'dind' && 'localhost' || 'host.docker.internal' }} 5432

      # pwd / bind-mount: the one behaviour that differs by mode. Container-only path (/tmp, not the
      # host-mounted workspace) so dind resolves it but dood's host daemon genuinely cannot.
      - name: pwd bind-mount differs by mode
        run: |
          docker pull -q alpine >/dev/null 2>&1 || true   # pre-pull so image-pull noise stays out of the check
          echo "marker-${{ github.sha }}" > /tmp/pwdmarker.txt
          if docker run --rm -v "/tmp/pwdmarker.txt:/m.txt" alpine cat /m.txt 2>/dev/null | grep -qx "marker-${{ github.sha }}"; then
            RESOLVED=yes
          else
            RESOLVED=no
          fi
          echo "bind-mount resolved in-namespace: $RESOLVED"
          if [ "${{ matrix.mode }}" = "dind" ]; then
            [ "$RESOLVED" = yes ]   # dind: resolves the container path
          else
            [ "$RESOLVED" = no ]    # dood: host namespace, container path absent
          fi


  test-pnpm:
    runs-on: ubuntu-latest
    needs: [github-context, build-pnpm-dood, build-pnpm-dind]
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
        mode: [dood, dind]
    container:
      image: jclaveau/${{ matrix.os }}-${{ matrix.mode }}-pnpm:${{ needs.github-context.outputs.tag }}
      options: >-
        --privileged
        --env "HOME=/home/runner"
    steps:
      - run: node --version
      - run: npm --version
      - run: pnpm --version
      - run: python3 --version
      - run: make --version
      - run: g++ --version

      - name: Compile a trivial native addon with node-gyp
        run: |
          mkdir -p /tmp/gyp-test && cd /tmp/gyp-test
          cat > hello.cc <<'EOF'
          #include <node.h>
          namespace demo {
            using v8::FunctionCallbackInfo; using v8::Isolate;
            using v8::Local; using v8::Object; using v8::String; using v8::Value;
            void Method(const FunctionCallbackInfo<Value>& a){
              a.GetReturnValue().Set(String::NewFromUtf8(a.GetIsolate(),"ok").ToLocalChecked());
            }
            void Init(Local<Object> e){ NODE_SET_METHOD(e,"hello",Method); }
            NODE_MODULE(NODE_GYP_MODULE_NAME, Init)
          }
          EOF
          printf '{ "targets": [ { "target_name": "hello", "sources": [ "hello.cc" ] } ] }' > binding.gyp
          npx -y node-gyp rebuild
          node -e "console.log(require('./build/Release/hello.node').hello())"


  test-playwright:
    runs-on: ubuntu-latest
    needs: [github-context, build-playwright-dood, build-playwright-dind]
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
        mode: [dood, dind]
    container:
      image: jclaveau/${{ matrix.os }}-${{ matrix.mode }}-playwright:${{ needs.github-context.outputs.tag }}
      options: >-
        --privileged
        --env "HOME=/home/runner"
    steps:
      - uses: actions/checkout@v4

      - run: node --version
      - run: docker --version
      - run: npm --version
      - run: playwright --version

      - run: pnpm --version
        working-directory: playwright

      - run: pnpm install
        working-directory: playwright

      - run: pnpm playwright test
        working-directory: playwright
