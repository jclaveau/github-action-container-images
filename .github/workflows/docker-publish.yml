name: Build and Push Docker Images

on:
  push:
    # branches: [ main ]
    # paths:
    #   - 'base/**'
    #   - 'playwright/**'
    #   - '.github/workflows/docker-publish.yml'
  pull_request:
    branches: [ main ]
  # schedule:
  #   # Run weekly to get security updates
  #   - cron: '0 0 * * 0'
  # workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  BASE_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ubuntu-dind
  PNPM_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/pnpm-dind
  PLAYWRIGHT_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/playwright-dind

jobs:
  github-context:
    runs-on: ubuntu-latest
    outputs:
      docker_group_id: ${{ steps.extract_docker_group_id.outputs.docker_group_id }}
    steps:
      # for debug only
      - run: sudo cat /etc/passwd
      - run: sudo cat /etc/group
      - run: pwd
      - run: whoami
      - run: id -u
      - run: id -g
      - run: groups runner
      - run: ls -l /home/runner
      - run: env

      - uses: actions/checkout@v4

      # used later
      - id: extract_docker_group_id
        run: 'echo "docker_group_id=$(getent group docker | cut -d: -f3)" >> "$GITHUB_OUTPUT"'

  build-base:
    runs-on: ubuntu-latest
    needs: github-context
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for base image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BASE_IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push base image
        id: build
        uses: docker/build-push-action@v5
        with:
          build-args: |
            DOCKER_GROUP_ID=${{ needs.github-context.outputs.docker_group_id }}
          context: ./base
          push: true # PRs push too so test jobs can pull this exact build by digest
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.BASE_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.BASE_IMAGE_NAME }}:buildcache,mode=max # https://www.blacksmith.sh/blog/cache-is-king-a-guide-for-docker-layer-caching-in-github-actions

      # TODO use artifacts https://docs.docker.com/build/ci/github-actions/share-image-jobs/

  test-postgres-on-base:
    runs-on: ubuntu-latest
    needs: build-base
    timeout-minutes: 5
    container:
      # https://docs.github.com/en/actions/how-tos/write-workflows/choose-where-workflows-run/run-jobs-in-a-container
      image: jclaveau/ubuntu-dind@${{ needs.build-base.outputs.digest }}
      options: >-
        --privileged
        --add-host=host.docker.internal:host-gateway
        --env "PWD=${{ github.workspace }}"
      # --network and --entrypoint are overwritten and not supported
      # --workdir also and must be specified with --env (using steps working-directory doesn't work with mounted dirs)
      # --security-opt seccomp=unconfined
      # --security-opt apparmor=unconfined
      volumes:
        - /home/runner/work:/home/runner/work
    steps:
      - run: docker inspect $(hostname)

      - run: pwd
      - run: whoami
      - run: id -u
      - run: groups runner

      - run: cat /etc/hosts
      - run: cat /etc/passwd
      - run: cat /etc/group
      - run: ls -l /home/runner
      - run: ls -l /__w

      - uses: actions/checkout@v4

      - name: Creating DB volume (as locally)
        run: |
          sudo mkdir -p -m 777 ./docker/volumes/postgres_15
          sudo chown -R 1000:1000 ./docker/volumes/postgres_15/

      - run: ls -l

      # this doesn't work https://github.com/docker/compose/issues/9122
      # - run: docker compose -f ./docker-compose-tests.yaml logs --follow > docker-compose.logs &

      # - run: docker compose -f ./docker-compose-tests.yaml up
      - run: docker compose -f ./docker-compose-tests.yaml up -d --wait

      - run: sudo nc -zv host.docker.internal 5432

      # - run: cat docker-compose.logs
      #   if: always()


  build-pnpm:
    runs-on: ubuntu-latest
    needs: build-base
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for pnpm image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PNPM_IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push pnpm image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./pnpm
          push: true # PRs push too so test jobs can pull this exact build by digest
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE_NAME }}@${{ needs.build-base.outputs.digest }}
          cache-from: type=registry,ref=${{ env.PNPM_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.PNPM_IMAGE_NAME }}:buildcache,mode=max


  test-node-gyp-on-pnpm:
    runs-on: ubuntu-latest
    needs: build-pnpm
    timeout-minutes: 5
    container:
      image: jclaveau/pnpm-dind@${{ needs.build-pnpm.outputs.digest }}
      options: >-
        --privileged
        --add-host=host.docker.internal:host-gateway
        --env "PWD=${{ github.workspace }}"
        --env "HOME=/home/runner"
      volumes:
        - /home/runner/work:/home/runner/work
    steps:
      - run: node --version
      - run: npm --version
      - run: pnpm --version
      - run: python3 --version
      - run: make --version
      - run: g++ --version

      - name: Compile a trivial native addon with node-gyp
        run: |
          mkdir -p /tmp/gyp-test && cd /tmp/gyp-test
          cat > hello.cc <<'EOF'
          #include <node.h>
          namespace demo {
            using v8::FunctionCallbackInfo; using v8::Isolate;
            using v8::Local; using v8::Object; using v8::String; using v8::Value;
            void Method(const FunctionCallbackInfo<Value>& a){
              a.GetReturnValue().Set(String::NewFromUtf8(a.GetIsolate(),"ok").ToLocalChecked());
            }
            void Init(Local<Object> e){ NODE_SET_METHOD(e,"hello",Method); }
            NODE_MODULE(NODE_GYP_MODULE_NAME, Init)
          }
          EOF
          printf '{ "targets": [ { "target_name": "hello", "sources": [ "hello.cc" ] } ] }' > binding.gyp
          npx -y node-gyp rebuild
          node -e "console.log(require('./build/Release/hello.node').hello())"


  build-playwright:
    runs-on: ubuntu-latest
    needs: build-pnpm
    # needs: test-postgres-on-base
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Playwright image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PLAYWRIGHT_IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Playwright image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./playwright
          push: true # PRs push too so test jobs can pull this exact build by digest
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.PNPM_IMAGE_NAME }}@${{ needs.build-pnpm.outputs.digest }}
          cache-from: type=registry,ref=${{ env.PLAYWRIGHT_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.PLAYWRIGHT_IMAGE_NAME }}:buildcache,mode=max



  test-postgres-on-playwright:
    runs-on: ubuntu-latest
    needs: build-playwright
    timeout-minutes: 5
    container:
      image: jclaveau/playwright-dind@${{ needs.build-playwright.outputs.digest }}
      options: >-
        --privileged
        --add-host=host.docker.internal:host-gateway
        --env "PWD=${{ github.workspace }}"
      volumes:
        - /home/runner/work:/home/runner/work
    steps:
      - run: docker inspect $(hostname)

      - run: pwd
      - run: whoami
      - run: id -u
      - run: groups runner

      - run: cat /etc/hosts
      - run: cat /etc/passwd
      - run: cat /etc/group
      - run: ls -l /home/runner
      - run: ls -l /__w

      - uses: actions/checkout@v4

      - name: Creating DB volume (as locally)
        run: |
          sudo mkdir -p -m 777 ./docker/volumes/postgres_15
          sudo chown -R 1000:1000 ./docker/volumes/postgres_15/

      - run: ls -l

      # - run: docker compose -f ./docker-compose-tests.yaml up
      - run: docker compose -f ./docker-compose-tests.yaml up -d --wait

      - run: sudo nc -zv host.docker.internal 5432


  test-playwright-use:
    runs-on: ubuntu-latest
    needs: build-playwright
    timeout-minutes: 5
    container:
      image: jclaveau/playwright-dind@${{ needs.build-playwright.outputs.digest }}
      options: >-
        --privileged
        --add-host=host.docker.internal:host-gateway
        --env "PWD=${{ github.workspace }}"
        --env "HOME=/home/runner"
      volumes:
        - /home/runner/work:/home/runner/work
    steps:
      - uses: actions/checkout@v4

      - run: pwd
      - run: whoami
      - run: ls -al

      - run: node --version
      - run: docker --version
      - run: npm --version
      - run: playwright --version

      - run: pnpm --version
        working-directory: playwright

      - run: pnpm playwright --version
        working-directory: playwright

      - run: pnpm playwright install --help
        working-directory: playwright

      - run: pnpm install
        working-directory: playwright

      - run: pnpm playwright test
        working-directory: playwright
