name: Build and Push Docker Images

on:
  push:
    # branches: [ main ]
    # paths:
    #   - 'base/**'
    #   - 'pnpm/**'
    #   - 'playwright/**'
    #   - 'dind/**'
    #   - '.github/workflows/docker-publish.yml'
  pull_request:
    branches: [ main ]
  # schedule:
  #   # Run weekly to get security updates
  #   - cron: '0 0 * * 0'
  # workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github-context:
    runs-on: ubuntu-latest
    outputs:
      docker_group_id: ${{ steps.extract_docker_group_id.outputs.docker_group_id }}
      # Throwaway run-scoped tag. Builds push only this; the chain + tests reference it. The
      # consumer tags (latest / pr-<n>) are added later by `promote`, only once every test passes.
      build_tag: sha-${{ github.sha }}
    steps:
      # for debug only
      - run: sudo cat /etc/passwd
      - run: sudo cat /etc/group
      - run: pwd
      - run: whoami
      - run: id -u
      - run: id -g
      - run: groups runner
      - run: ls -l /home/runner
      - run: env

      - uses: actions/checkout@v4

      # used later
      - id: extract_docker_group_id
        run: 'echo "docker_group_id=$(getent group docker | cut -d: -f3)" >> "$GITHUB_OUTPUT"'


  # ----------------------------------------------------------------------------
  # Builds: a shared, unpublished `docker` base (ubuntu-gha-tools + docker/compose), then TWO
  # symmetric, independent chains built in parallel — each layer's dood and dind build side by side:
  #   dood: docker -> dood -> dood-node -> dood-pnpm -> dood-playwright
  #   dind: docker -> dind -> dind-node -> dind-pnpm -> dind-playwright
  # The only difference is the base: `dind` applies the ./dind overlay (start-dockerd) once, then both
  # chains install node/pnpm/playwright the same way (./node, ./pnpm, ./playwright). The layers are
  # re-installed per chain on purpose — the symmetric, easy-to-follow graph matters more than dedup
  # (CI is free on open source).
  # Matrix `os` is currently [ubuntu]; adding alpine = extend the list (+ os-specific dirs).
  # ----------------------------------------------------------------------------

  build-gha-tools:
    runs-on: ubuntu-latest
    needs: github-context
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-gha-tools
          # Build pushes only the throwaway run-scoped tag; consumer tags are added by `promote`.
          tags: type=raw,value=${{ needs.github-context.outputs.build_tag }}
      - uses: docker/build-push-action@v5
        with:
          context: ./ubuntu-gha-tools
          push: true # PRs push too so downstream jobs can pull this exact build
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-gha-tools:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-gha-tools:buildcache,mode=max

  # Unpublished shared base: ubuntu-gha-tools + docker/compose. Only ever pushed under the
  # throwaway build tag (never promoted); dood and dind are built from it in parallel.
  build-docker:
    runs-on: ubuntu-latest
    needs: [github-context, build-gha-tools]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-docker
          tags: type=raw,value=${{ needs.github-context.outputs.build_tag }}
      - uses: docker/build-push-action@v5
        with:
          context: ./docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-gha-tools:${{ needs.github-context.outputs.build_tag }}
            DOCKER_GROUP_ID=${{ needs.github-context.outputs.docker_group_id }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-docker:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-docker:buildcache,mode=max

  build-dood:
    runs-on: ubuntu-latest
    needs: [github-context, build-docker]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood
          # Build pushes only the throwaway run-scoped tag; consumer tags are added by `promote`.
          tags: type=raw,value=${{ needs.github-context.outputs.build_tag }}
      - uses: docker/build-push-action@v5
        with:
          context: ./dood
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-docker:${{ needs.github-context.outputs.build_tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood:buildcache,mode=max

  build-dind:
    runs-on: ubuntu-latest
    needs: [github-context, build-docker]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind
          # Build pushes only the throwaway run-scoped tag; consumer tags are added by `promote`.
          tags: type=raw,value=${{ needs.github-context.outputs.build_tag }}
      - uses: docker/build-push-action@v5
        with:
          context: ./dind
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-docker:${{ needs.github-context.outputs.build_tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind:buildcache,mode=max


  build-node-dood:
    runs-on: ubuntu-latest
    needs: [github-context, build-dood]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-node
          # Build pushes only the throwaway run-scoped tag; consumer tags are added by `promote`.
          tags: type=raw,value=${{ needs.github-context.outputs.build_tag }}
      - uses: docker/build-push-action@v5
        with:
          context: ./node
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood:${{ needs.github-context.outputs.build_tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-node:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-node:buildcache,mode=max

  build-node-dind:
    runs-on: ubuntu-latest
    needs: [github-context, build-dind]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-node
          # Build pushes only the throwaway run-scoped tag; consumer tags are added by `promote`.
          tags: type=raw,value=${{ needs.github-context.outputs.build_tag }}
      - uses: docker/build-push-action@v5
        with:
          context: ./node
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind:${{ needs.github-context.outputs.build_tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-node:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-node:buildcache,mode=max


  build-pnpm-dood:
    runs-on: ubuntu-latest
    needs: [github-context, build-node-dood]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-pnpm
          # Build pushes only the throwaway run-scoped tag; consumer tags are added by `promote`.
          tags: type=raw,value=${{ needs.github-context.outputs.build_tag }}
      - uses: docker/build-push-action@v5
        with:
          context: ./pnpm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-node:${{ needs.github-context.outputs.build_tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-pnpm:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-pnpm:buildcache,mode=max

  build-pnpm-dind:
    runs-on: ubuntu-latest
    needs: [github-context, build-node-dind]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-pnpm
          # Build pushes only the throwaway run-scoped tag; consumer tags are added by `promote`.
          tags: type=raw,value=${{ needs.github-context.outputs.build_tag }}
      - uses: docker/build-push-action@v5
        with:
          context: ./pnpm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-node:${{ needs.github-context.outputs.build_tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-pnpm:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-pnpm:buildcache,mode=max


  build-playwright-dood:
    runs-on: ubuntu-latest
    needs: [github-context, build-pnpm-dood]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-playwright
          # Build pushes only the throwaway run-scoped tag; consumer tags are added by `promote`.
          tags: type=raw,value=${{ needs.github-context.outputs.build_tag }}
      - uses: docker/build-push-action@v5
        with:
          context: ./playwright
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-pnpm:${{ needs.github-context.outputs.build_tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-playwright:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dood-playwright:buildcache,mode=max

  build-playwright-dind:
    runs-on: ubuntu-latest
    needs: [github-context, build-pnpm-dind]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-playwright
          # Build pushes only the throwaway run-scoped tag; consumer tags are added by `promote`.
          tags: type=raw,value=${{ needs.github-context.outputs.build_tag }}
      - uses: docker/build-push-action@v5
        with:
          context: ./playwright
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-pnpm:${{ needs.github-context.outputs.build_tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-playwright:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-dind-playwright:buildcache,mode=max


  # ----------------------------------------------------------------------------
  # Tests: split per the README's Usage vs Effects contract.
  #  - *-usage   : the documented usage works (daemon reachable, compose comes up). Mode-agnostic.
  #  - *-effects : the dood/dind behavioural divergence — where published ports land, and whether
  #                a bind-mount resolves in-namespace. Re-runs the stack in its own container.
  # Effects are layer-independent (the dind overlay is byte-identical across layers), so they're
  # tested once, at the base layer.
  # ----------------------------------------------------------------------------

  test-gha-tools-usage:
    runs-on: ubuntu-latest
    needs: [github-context, build-gha-tools]
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
    container:
      image: jclaveau/${{ matrix.os }}-gha-tools:${{ needs.github-context.outputs.build_tag }}
    steps:
      # NB: GitHub runs container-job steps as root (uid 0), ignoring the image's USER, and injects
      # its own RUNNER_TOOL_CACHE/ImageOS — so we only print those, and assert the image-controlled
      # facts (the OS version and the curated tools).
      - name: Image identity (diagnostics)
        run: |
          echo "user=$(id -u):$(id -g) ($(whoami))  ImageOS=$ImageOS  RUNNER_TOOL_CACHE=$RUNNER_TOOL_CACHE"
          . /etc/os-release && echo "os=$PRETTY_NAME"
      - name: It is Ubuntu 24.04
        run: . /etc/os-release && test "$VERSION_ID" = "24.04"
      - name: Curated OS tools are present
        run: for t in git jq g++ make zip unzip rsync shellcheck python3 sudo; do command -v "$t" >/dev/null || { echo "missing $t"; exit 1; }; done

  test-docker-usage:
    runs-on: ubuntu-latest
    needs: [github-context, build-dood, build-dind]
    timeout-minutes: 5
    env:
      # overlay2-on-overlayfs is unstable nested in GHA container jobs; fuse-overlayfs gives
      # overlay-like CoW (far faster than vfs) and works here (/dev/fuse present). vfs is the
      # documented fallback. dood ignores this (no inner daemon).
      DOCKER_STORAGE_DRIVER: fuse-overlayfs
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
        mode: [dood, dind]
    container:
      image: jclaveau/${{ matrix.os }}-${{ matrix.mode }}:${{ needs.github-context.outputs.build_tag }}
      # dind: point clients at the inner daemon via the container env (NOT $GITHUB_ENV, which would
      # leak DOCKER_HOST to the host-side post-job cleanup and fail it). dood: unset => host socket.
      options: >-
        --privileged
        --add-host=host.docker.internal:host-gateway
        --env "PWD=${{ github.workspace }}"
        --env "HOME=/home/runner"
        ${{ matrix.mode == 'dind' && '--env DOCKER_HOST=unix:///var/run/dind.sock' || '' }}
      volumes:
        - /home/runner/work:/home/runner/work
    steps:
      # Kept multi-step on purpose: the images are a drop-in optimization, so a consumer's normal
      # multi-step workflow must work unchanged. dind only adds `start-dockerd` as the first step;
      # the inner daemon then persists across steps (verified by tmp-dind-debug.yml).
      - name: Start inner daemon (dind only)
        if: matrix.mode == 'dind'
        run: start-dockerd

      - run: docker info

      - uses: actions/checkout@v4

      - name: Creating DB volume (as locally)
        run: |
          sudo mkdir -p -m 777 ./docker/volumes/postgres_15
          sudo chown -R 1000:1000 ./docker/volumes/postgres_15/

      - name: docker compose comes up (in-network healthchecks pass)
        run: docker compose -f ./docker-compose-tests.yaml up -d --wait


  test-docker-effects:
    runs-on: ubuntu-latest
    needs: [github-context, build-dood, build-dind]
    timeout-minutes: 5
    env:
      DOCKER_STORAGE_DRIVER: fuse-overlayfs
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
        mode: [dood, dind]
    container:
      image: jclaveau/${{ matrix.os }}-${{ matrix.mode }}:${{ needs.github-context.outputs.build_tag }}
      options: >-
        --privileged
        --add-host=host.docker.internal:host-gateway
        --env "PWD=${{ github.workspace }}"
        --env "HOME=/home/runner"
        ${{ matrix.mode == 'dind' && '--env DOCKER_HOST=unix:///var/run/dind.sock' || '' }}
      volumes:
        - /home/runner/work:/home/runner/work
    steps:
      - name: Start inner daemon (dind only)
        if: matrix.mode == 'dind'
        run: start-dockerd

      - uses: actions/checkout@v4

      - name: Creating DB volume (as locally)
        run: |
          sudo mkdir -p -m 777 ./docker/volumes/postgres_15
          sudo chown -R 1000:1000 ./docker/volumes/postgres_15/

      - run: docker compose -f ./docker-compose-tests.yaml up -d --wait

      # Effect — published ports: dind publishes inside the job container (reach on localhost);
      # dood publishes on the shared host daemon (reach via host.docker.internal).
      - name: Published port lands at the mode-correct endpoint
        run: sudo nc -zv ${{ matrix.mode == 'dind' && 'localhost' || 'host.docker.internal' }} 5432

      # Effect — bind-mount resolution. Container-only path (/tmp, not the host-mounted workspace)
      # so dind resolves it in-namespace but dood's host daemon genuinely cannot.
      - name: Bind-mount resolution differs by mode
        run: |
          docker pull -q alpine >/dev/null 2>&1 || true   # pre-pull so image-pull noise stays out of the check
          echo "marker-${{ github.sha }}" > /tmp/pwdmarker.txt
          if docker run --rm -v "/tmp/pwdmarker.txt:/m.txt" alpine cat /m.txt 2>/dev/null | grep -qx "marker-${{ github.sha }}"; then
            RESOLVED=yes
          else
            RESOLVED=no
          fi
          echo "bind-mount resolved in-namespace: $RESOLVED"
          if [ "${{ matrix.mode }}" = "dind" ]; then
            [ "$RESOLVED" = yes ]   # dind: resolves the container path
          else
            [ "$RESOLVED" = no ]    # dood: host namespace, container path absent
          fi


  test-node-usage:
    runs-on: ubuntu-latest
    needs: [github-context, build-node-dood, build-node-dind]
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
        mode: [dood, dind]
    container:
      image: jclaveau/${{ matrix.os }}-${{ matrix.mode }}-node:${{ needs.github-context.outputs.build_tag }}
      options: >-
        --privileged
        --env "HOME=/home/runner"
    steps:
      - run: node --version
      - run: npm --version
      - run: python3 --version
      - run: make --version
      - run: g++ --version

      - name: Compile a trivial native addon with node-gyp
        run: |
          mkdir -p /tmp/gyp-test && cd /tmp/gyp-test
          cat > hello.cc <<'EOF'
          #include <node.h>
          namespace demo {
            using v8::FunctionCallbackInfo; using v8::Isolate;
            using v8::Local; using v8::Object; using v8::String; using v8::Value;
            void Method(const FunctionCallbackInfo<Value>& a){
              a.GetReturnValue().Set(String::NewFromUtf8(a.GetIsolate(),"ok").ToLocalChecked());
            }
            void Init(Local<Object> e){ NODE_SET_METHOD(e,"hello",Method); }
            NODE_MODULE(NODE_GYP_MODULE_NAME, Init)
          }
          EOF
          printf '{ "targets": [ { "target_name": "hello", "sources": [ "hello.cc" ] } ] }' > binding.gyp
          npx -y node-gyp rebuild
          node -e "console.log(require('./build/Release/hello.node').hello())"


  test-pnpm-usage:
    runs-on: ubuntu-latest
    needs: [github-context, build-pnpm-dood, build-pnpm-dind]
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
        mode: [dood, dind]
    container:
      image: jclaveau/${{ matrix.os }}-${{ matrix.mode }}-pnpm:${{ needs.github-context.outputs.build_tag }}
      options: >-
        --privileged
        --env "HOME=/home/runner"
    steps:
      - run: node --version   # inherited from the node layer
      - run: pnpm --version


  test-playwright-usage:
    runs-on: ubuntu-latest
    needs: [github-context, build-playwright-dood, build-playwright-dind]
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
        mode: [dood, dind]
    container:
      image: jclaveau/${{ matrix.os }}-${{ matrix.mode }}-playwright:${{ needs.github-context.outputs.build_tag }}
      options: >-
        --privileged
        --env "HOME=/home/runner"
    steps:
      - uses: actions/checkout@v4

      - run: node --version
      - run: docker --version
      - run: npm --version
      - run: playwright --version

      - run: pnpm --version
        working-directory: playwright

      - run: pnpm install
        working-directory: playwright

      - run: pnpm playwright test
        working-directory: playwright


  # ----------------------------------------------------------------------------
  # act: run a tiny workflow through nektos/act using each base image AS the
  # `ubuntu-latest` runner — exercises the documented "use these as act runners"
  # path. Runs on a plain runner (not a container job) so act can drive Docker.
  # ----------------------------------------------------------------------------

  test-docker-act:
    runs-on: ubuntu-latest
    needs: [github-context, build-dood, build-dind]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
        mode: [dood, dind]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Install act
        run: curl -sSL https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash -s -- -b /usr/local/bin
      - name: Pre-pull the container image
        run: docker pull "${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-${{ matrix.mode }}:${{ needs.github-context.outputs.build_tag }}"
      - name: Run the smoke workflow through act
        env:
          IMG: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-${{ matrix.mode }}:${{ needs.github-context.outputs.build_tag }}
        run: |
          # Faithful to GHA: our image is the job `container:` (image + options live IN the smoke
          # workflow, injected via --var), NOT a runner override. `-self-hosted` runs on the real
          # ubuntu-latest host (no runner image pulled, no interactive image prompt), so the job
          # container runs exactly as on GHA.
          act push -W tests/act/smoke-${{ matrix.mode }}.yml \
            -P ubuntu-latest=-self-hosted \
            --var RUNNER_IMAGE="$IMG"


  # ----------------------------------------------------------------------------
  # Versions: read the actual installed minors once from the top dood image (it
  # transitively contains OS + node + pnpm + playwright). `promote` turns these
  # into the version-pinned consumer tags. node is read from the image because its
  # ARG isn't authoritative (NodeSource installs the latest within the major).
  # ----------------------------------------------------------------------------

  versions:
    runs-on: ubuntu-latest
    needs: [github-context, build-playwright-dood]
    outputs:
      os: ${{ steps.v.outputs.os }}
      node: ${{ steps.v.outputs.node }}
      pnpm: ${{ steps.v.outputs.pnpm }}
      pw: ${{ steps.v.outputs.pw }}
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: v
        env:
          IMG: ${{ secrets.DOCKERHUB_USERNAME }}/ubuntu-dood-playwright:${{ needs.github-context.outputs.build_tag }}
        run: |
          # `docker run` pull progress goes to stderr, so $GITHUB_OUTPUT (stdout) stays clean.
          # Prefixes are baked in so `promote` composes the pinned tag by concatenation.
          # node/pnpm/playwright resolve via the image's ENV PATH (+= $PNPM_HOME); node is in /usr/bin.
          docker run --rm "$IMG" bash -c '
            . /etc/os-release
            echo "os=ubuntu${VERSION_ID}"
            echo "node=node$(node -v | sed "s/^v//" | cut -d. -f1,2)"
            echo "pnpm=pnpm$(pnpm -v | cut -d. -f1,2)"
            echo "pw=pw$(playwright --version | grep -oE "[0-9]+\.[0-9]+" | head -1)"
          ' >> "$GITHUB_OUTPUT"


  # ----------------------------------------------------------------------------
  # Promote: the all-or-nothing publish gate. `needs` every test job, so a single
  # failure skips this job entirely and nothing consumer-facing is published. On
  # success it adds the consumer tags (latest / pr-<n>) to the exact digests that
  # were tested — server-side retag via imagetools, no pull/rebuild.
  # ----------------------------------------------------------------------------

  promote:
    runs-on: ubuntu-latest
    needs: [github-context, versions, test-gha-tools-usage, test-docker-usage, test-docker-effects, test-docker-act, test-node-usage, test-pnpm-usage, test-playwright-usage]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu]
        image: [gha-tools, dood, dind, dood-node, dind-node, dood-pnpm, dind-pnpm, dood-playwright, dind-playwright]
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # Compose the version-pinned tag for this image from the minors read by `versions`.
      - id: pin
        env:
          OS: ${{ needs.versions.outputs.os }}
          NODE: ${{ needs.versions.outputs.node }}
          PNPM: ${{ needs.versions.outputs.pnpm }}
          PW: ${{ needs.versions.outputs.pw }}
        run: |
          case "${{ matrix.image }}" in
            gha-tools|dood|dind)             TAG="${OS}";;
            dood-node|dind-node)             TAG="${OS}-${NODE}";;
            dood-pnpm|dind-pnpm)             TAG="${OS}-${NODE}-${PNPM}";;
            dood-playwright|dind-playwright) TAG="${OS}-${NODE}-${PNPM}-${PW}";;
          esac
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-${{ matrix.image }}
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=${{ steps.pin.outputs.tag }},enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}
      - name: Promote tested digest to consumer tags
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.os }}-${{ matrix.image }}:${{ needs.github-context.outputs.build_tag }}
