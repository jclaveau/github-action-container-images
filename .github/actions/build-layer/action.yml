name: build-layer
description: >-
  Build one image layer and push it to GHCR under the run-scoped build tag, with registry-backed
  buildx cache. The whole pipeline's build mechanics (buildx, ghcr login, metadata, cache) live here so
  each build job in the workflow stays a thin, per-layer call.

inputs:
  image:
    description: GHCR repo short name under ghcr.io/jclaveau, e.g. ubuntu-docker
    required: true
  context:
    description: Docker build context directory, e.g. ./docker
    required: true
  dockerfile:
    description: Dockerfile name within the context dir (e.g. Dockerfile.alpine for the Alpine variant)
    required: false
    default: Dockerfile
  build_tag:
    description: Run-scoped tag the build is pushed under (e.g. sha-<sha>)
    required: true
  base_image:
    description: Base image short name for the BASE_IMAGE build-arg; empty for the root layer
    required: false
    default: ""
  docker_group_id:
    description: DOCKER_GROUP_ID build-arg; only the docker layer needs it
    required: false
    default: ""
  github_token:
    description: Token for the GHCR push (composite actions can't read secrets; pass secrets.GITHUB_TOKEN)
    required: true
  changed_map:
    description: >-
      JSON map {image: true|false} from the `changes` job, keyed by the full image name (== `image`).
      When this layer's entry is true (or the map is empty / lacks the key) it is built and pushed
      (sha + edge); otherwise the build is skipped and the layer's `edge` image is retagged to build_tag,
      so downstream builds / tests / promote still resolve the sha.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v3
      with:
        buildkitd-flags: --debug
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github_token }}
    - id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/jclaveau/${{ inputs.image }}
        # Run-scoped tag (the chain + tests reference it) + moving `edge` (retag source for unchanged
        # layers on later runs). Consumer tags (latest / pinned) are added by `promote`.
        tags: |
          type=raw,value=${{ inputs.build_tag }}
          type=raw,value=edge
    # Resolve this layer's changed flag from the map (keyed by image). Empty map / missing key => build.
    - id: gate
      shell: bash
      run: |
        if [ -z '${{ inputs.changed_map }}' ]; then
          changed=true
        else
          changed=$(jq -r --arg k "${{ inputs.image }}" '.[$k] // true' <<<'${{ inputs.changed_map }}')
        fi
        echo "changed=$changed" >> "$GITHUB_OUTPUT"
        echo "layer ${{ inputs.image }} changed=$changed"
    # Changed layer: build + push (sha + edge).
    - if: ${{ steps.gate.outputs.changed == 'true' }}
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.context }}/${{ inputs.dockerfile }}
        push: true # PRs push too so downstream jobs can pull this exact build
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # Empty lines are dropped, so the root layer / non-docker layers emit no build-args.
        build-args: |
          ${{ inputs.base_image && format('BASE_IMAGE=ghcr.io/jclaveau/{0}:{1}', inputs.base_image, inputs.build_tag) || '' }}
          ${{ inputs.docker_group_id && format('DOCKER_GROUP_ID={0}', inputs.docker_group_id) || '' }}
        cache-from: type=registry,ref=ghcr.io/jclaveau/${{ inputs.image }}:buildcache
        cache-to: type=registry,ref=ghcr.io/jclaveau/${{ inputs.image }}:buildcache,mode=max
    # Unchanged layer: skip the build, just point this run's sha at the existing `edge` image
    # (server-side manifest copy — no build, no pull). Keeps the sha-chain intact for downstream/tests.
    - if: ${{ steps.gate.outputs.changed != 'true' }}
      shell: bash
      run: |
        echo "Layer unchanged — retagging edge -> ${{ inputs.build_tag }} (no rebuild)"
        docker buildx imagetools create \
          -t "ghcr.io/jclaveau/${{ inputs.image }}:${{ inputs.build_tag }}" \
          "ghcr.io/jclaveau/${{ inputs.image }}:edge"
